name: Build Android APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Native Android Project
        run: npx expo prebuild --platform android --clean

      - name: Fix build.gradle for ML Kit
        run: |
          sed -i 's/mavenCentral()/mavenCentral()\n        google()/' android/build.gradle
          sed -i 's/minSdkVersion = .*/minSdkVersion = 21/' android/build.gradle

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Find APK
        id: find-apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" ./ocr-excel-app.apk
            echo "APK found and copied"
          else
            echo "APK not found"
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocr-excel-app
          path: ocr-excel-app.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: ocr-excel-app.apk
          body: |
            ## OCR Excel App - Android APK
            
            ### Features
            - Automatic WhatsApp message parsing (Bank, Applicant, Reason)
            - Automatic OCR for GPS extraction from photos
            - Excel export (.xlsx)
            - Local storage
            
            ### How to Use
            1. Download `ocr-excel-app.apk`
            2. Enable "Install from unknown sources" in phone settings
            3. Install the APK
            4. Share messages + photos from WhatsApp to this app
            5. App will automatically extract data
            6. Export to Excel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
